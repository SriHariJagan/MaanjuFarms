<!doctype html>
<html lang="en">
  <head>
    <!-- ✅ Basic SEO -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Title (VERY IMPORTANT) -->
    <title>Maanjoo Farms | Organic Farming, Fresh Produce & Farm Stay</title>

    <!-- ✅ Meta Description -->
    <meta
      name="description"
      content="Maanjoo Farms offers fresh organic produce, eco-friendly farming, and peaceful farm stays. Experience nature, sustainability, and healthy living."
    />

    <!-- ✅ Keywords (less important but okay) -->
    <meta
      name="keywords"
      content="Maanjoo Farms, organic farming, farm stay, fresh vegetables, eco tourism, natural farming"
    />

    <!-- ✅ Author -->
    <meta name="author" content="Maanjoo Farms" />

    <!-- ✅ Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favIcon.png" />

    <!-- ✅ Open Graph (for WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:title" content="Maanjoo Farms" />
    <meta
      property="og:description"
      content="Experience organic farming and peaceful farm stays at Maanjoo Farms."
    />
    <meta property="og:image" content="/preview.jpg" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:type" content="website" />

    <!-- ✅ Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Maanjoo Farms" />
    <meta
      name="twitter:description"
      content="Fresh organic produce & eco farm experience."
    />
    <meta name="twitter:image" content="/preview.jpg" />

    <!-- ✅ Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com" />

    <!-- ✅ Robots -->
    <meta name="robots" content="index, follow" />

    <!-- ✅ Theme Color (mobile UI) -->
    <meta name="theme-color" content="#4CAF50" />

    <!-- ✅ Preconnect (performance boost) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ✅ Structured Data (VERY POWERFUL SEO) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Maanjoo Farms",
        "url": "https://yourdomain.com",
        "logo": "https://yourdomain.com/logo.png",
        "sameAs": [
          "https://facebook.com/",
          "https://instagram.com/"
        ]
      }
    </script>
  </head>

  <body>
    <!-- ✅ React Root -->
    <div id="root"></div>

    <!-- ✅ Main Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
